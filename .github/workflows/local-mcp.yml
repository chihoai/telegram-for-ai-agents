name: Local MCP

on:
  pull_request:
    paths:
      - ".github/workflows/local-mcp.yml"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "docs/**"
      - "scripts/**"
      - "src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/local-mcp.yml"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "docs/**"
      - "scripts/**"
      - "src/**"

jobs:
  verify-local-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 23]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check local install surface
        run: npm run check:local-install
